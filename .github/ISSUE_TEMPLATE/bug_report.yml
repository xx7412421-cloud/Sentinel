# 📋 Create GitHub Issue Templates

## Overview

Create standardized GitHub issue templates to improve issue quality, consistency, and project triage efficiency. Templates will guide contributors to provide the necessary information when reporting bugs, requesting features, or proposing documentation improvements.

## Implementation

### Directory Structure

```text
.github/
└── ISSUE_TEMPLATE/
    ├── bug_report.yml
    ├── feature_request.yml
    └── documentation.yml
```

---

### 1. Bug Report Template

**.github/ISSUE_TEMPLATE/bug_report.yml**

```yaml
name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the issue clearly
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Node.js version, OS, Browser, etc.
```



**.github/ISSUE_TEMPLATE/feature_request.yml**

```yaml
name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
```

---

### 3. Documentation Template

**.github/ISSUE_TEMPLATE/documentation.yml**

```yaml
name: Documentation
description: Request documentation improvements
title: "[DOCS]: "
labels: ["documentation"]
body:
  - type: textarea
    id: issue
    attributes:
      label: Documentation Issue
      description: What is missing, incorrect, or unclear?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Affected File/Page
      placeholder: docs/setup.md
```

